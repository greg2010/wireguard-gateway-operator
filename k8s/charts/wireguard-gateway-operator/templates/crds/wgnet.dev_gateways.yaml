---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: gateways.wgnet.dev
spec:
  group: wgnet.dev
  names:
    kind: Gateway
    listKind: GatewayList
    plural: gateways
    shortNames:
    - gw
    singular: gateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.address
      name: Address
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              dnsHostnames:
                description: DNSHostnames are FQDNs the operator publishes via a DNSEndpoint.
                items:
                  type: string
                type: array
              forwards:
                description: Forwards are the public ports DNAT'd through the gateway
                  to in-cluster pods.
                items:
                  properties:
                    namespace:
                      description: |-
                        Namespace of the target Service. Defaults to the Gateway's namespace.
                        Cross-namespace forwards require the target namespace to carry the opt-in
                        label.
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    port:
                      description: |-
                        Port is the public port opened on the gateway VM and DNAT'd through the
                        tunnel.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    protocol:
                      description: Protocol is an L4 transport protocol for a forwarded
                        port.
                      enum:
                      - TCP
                      - UDP
                      type: string
                    service:
                      description: |-
                        Service is the bare in-cluster Service name, constrained to a single
                        DNS-1035 label so a dotted FQDN cannot bypass the Namespace gate.
                      minLength: 1
                      pattern: ^[a-z]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    targetPort:
                      description: TargetPort is the port on Service; it defaults
                        to Port when unset.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                  required:
                  - port
                  - protocol
                  - service
                  type: object
                maxItems: 64
                type: array
              gcp:
                properties:
                  diskSizeGB:
                    default: 20
                    description: DiskSizeGB is the gateway VM boot disk size in GB.
                    format: int32
                    minimum: 1
                    type: integer
                  image:
                    default: projects/kinvolk-public/global/images/family/flatcar-stable
                    description: |-
                      Image is the gateway VM boot image. The gateway boots Flatcar because its
                      userData is Flatcar Ignition; this defaults to the GCP Flatcar stable family.
                    type: string
                  machineType:
                    default: e2-small
                    type: string
                  projectID:
                    description: |-
                      ProjectID is the GCP project that owns the gateway VM and its Secret Manager
                      secret. The boot keyfetch reads it from instance metadata to resolve the
                      secret URL.
                    minLength: 1
                    type: string
                  region:
                    minLength: 1
                    type: string
                  reservedIP:
                    default: true
                    description: |-
                      ReservedIP allocates a static external IP so the address survives an
                      instance replace.
                    type: boolean
                  spot:
                    default: false
                    description: Spot runs the gateway VM as a preemptible spot instance.
                    type: boolean
                  zone:
                    minLength: 1
                    type: string
                required:
                - projectID
                - region
                - zone
                type: object
              link:
                default: {}
                description: |-
                  Link configures the in-cluster link Deployment. Every value defaults via the
                  CRD, so the block may be omitted to get a single-replica link.
                properties:
                  replicas:
                    default: 1
                    description: |-
                      Replicas is the number of link pods. Values >1 enable hot-standby
                      failover and safe rolling updates via leader election.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              provider:
                default: gcp
                description: |-
                  Provider selects the provider-specific Crossplane Composition that
                  provisions the gateway VM, matched by the composite's compositionSelector.
                  Only gcp is supported today.
                enum:
                - gcp
                type: string
              wireguard:
                default: {}
                description: |-
                  Wireguard carries the provider-agnostic WireGuard tunnel parameters. Every
                  value defaults via the CRD, so the block may be omitted to get the standard
                  tunnel.
                properties:
                  gatewayAddress:
                    default: 10.99.0.1
                    description: GatewayAddress is the gateway VM's wg0 address (without
                      CIDR suffix).
                    pattern: ^((25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])$
                    type: string
                  keepalive:
                    default: 25
                    description: Keepalive is the link's persistent-keepalive interval
                      in seconds.
                    format: int32
                    type: integer
                  linkAddress:
                    default: 10.99.0.2
                    description: LinkAddress is the link end's wg0 address (without
                      CIDR suffix).
                    pattern: ^((25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])$
                    type: string
                  listenPort:
                    default: 51820
                    description: ListenPort is the gateway VM's WireGuard UDP listen
                      port.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  mtu:
                    default: 1380
                    description: MTU is the link's wg0 MTU.
                    format: int32
                    type: integer
                  reconcileInterval:
                    default: 10s
                    description: ReconcileInterval is how often the link re-reads
                      the XGatewayGCP address.
                    type: string
                  subnet:
                    default: 10.99.0.0/29
                    description: |-
                      Subnet is the tunnel CIDR; its suffix sizes both interface addresses and it
                      is the peer's sole allowed IP range.
                    pattern: ^((25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])/(3[0-2]|[12]?[0-9])$
                    type: string
                type: object
            required:
            - gcp
            type: object
            x-kubernetes-validations:
            - message: each forward must use a unique port and protocol combination
              rule: '!has(self.forwards) || self.forwards.all(f1, self.forwards.exists_one(f2,
                f2.port == f1.port && f2.protocol == f1.protocol))'
            - message: a UDP forward must not use the WireGuard listen port (spec.wireguard.listenPort)
              rule: '!has(self.forwards) || self.forwards.all(f, !(f.protocol == ''UDP''
                && f.port == self.wireguard.listenPort))'
          status:
            properties:
              address:
                description: Address is the gateway VM's public ingress IP, mirrored
                  from the XGatewayGCP.
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              serviceAccountEmail:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
