apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wireguard-gateway-operator.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wireguard-gateway-operator.labels" (dict "ctx" . "component" "operator") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  # The bound ClusterRole (role.yaml) is controller-gen output with the fixed name
  # gateway-operator; the binding matches it. Cluster-scoped names are global, so
  # this assumes one operator install per cluster.
  name: gateway-operator
  labels:
    {{- include "wireguard-gateway-operator.labels" (dict "ctx" . "component" "operator") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gateway-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "wireguard-gateway-operator.name" . }}
    namespace: {{ .Release.Namespace }}
