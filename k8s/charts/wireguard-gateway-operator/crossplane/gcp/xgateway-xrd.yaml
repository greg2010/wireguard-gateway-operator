apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xgatewaygcps.infra.wgnet.dev
spec:
  scope: Namespaced
  group: infra.wgnet.dev
  names:
    kind: XGatewayGCP
    plural: xgatewaygcps
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                region: { type: string }
                zone: { type: string }
                machineType: { type: string }
                image: { type: string }
                diskSizeGB: { type: integer }
                spot: { type: boolean }
                enableOsLogin: { type: boolean }
                userData: { type: string }
                sharedNetworkName: { type: string }
                reservedIP: { type: boolean }
                projectID: { type: string }
                wgListenPort: { type: integer }
                wgMTU: { type: integer }
                wgGatewayAddress: { type: string }
                wgLinkAddress: { type: string }
                wgSubnet: { type: string }
                allowedPorts:
                  type: array
                  items:
                    type: object
                    properties:
                      port: { type: integer }
                      protocol: { type: string }
                    required: [port, protocol]
                serviceAccountId: { type: string }
                secretId: { type: string }
                wgKeySecretRef:
                  type: object
                  properties:
                    name: { type: string }
                    key: { type: string }
                  required: [name, key]
              required: [region, zone, machineType, sharedNetworkName, wgListenPort, wgMTU]
            status:
              type: object
              properties:
                address: { type: string }
                serviceAccountEmail: { type: string }
