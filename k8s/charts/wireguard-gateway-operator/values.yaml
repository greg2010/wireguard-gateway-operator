# wireguard-gateway-operator chart configuration contract.
#
# The operator owns per-Gateway resource creation at runtime; this chart installs
# the operator, its RBAC and CRDs, the static Flatcar Ignition userData, the
# XGatewayGCP XRD/Composition, and the XGatewayNetwork XRD/Composition that backs
# the shared auto-mode VPC. Every per-Gateway value (the GCP placement and
# projectID, the WireGuard tunnel parameters, forwards, dnsHostnames) is expressed
# on the Gateway CR, not here.
#
# Required before deploy: operator.image, link.image. Everything else has a
# working default.

# Gates only the user-facing platform prerequisite documentation knob: the
# Crossplane provider, fabric MRs, and ProviderConfig the Compositions resolve
# against must exist before any Gateway provisions. The operator hard-requires the
# XGatewayGCP and XGatewayNetwork CRDs at startup, so the XRDs and Compositions
# install unconditionally.
crossplane:
  enabled: false

operator:
  image:
    repository: ""
    tag: ""
  pullPolicy: IfNotPresent
  # Single active replica; leader election guards against split-brain across the
  # replica count, so this can be raised for warm standby.
  replicas: 1
  # Single-active-replica reconciliation via a Lease. Maps GATEWAY_OPERATOR_LEADER_ELECTION.
  leaderElection: true
  # Prometheus metrics bind address. "0" disables. Maps GATEWAY_OPERATOR_METRICS_ADDR.
  metricsAddr: ":8080"
  # healthz/readyz bind address; the probes target it. Maps GATEWAY_OPERATOR_HEALTH_ADDR.
  healthAddr: ":8081"
  # GCP VPC shared by all gateways this operator manages. Empty derives the name
  # from the release as wgnet-<release>, so separate releases (including clusters
  # that share one GCP project) get distinct VPCs with no manual coordination.
  # Set a value only to pin a specific VPC name. Maps GATEWAY_SHARED_NETWORK_NAME.
  sharedNetworkName: ""
  # zap level name (debug, info, warn, error). Maps LOG_LEVEL.
  logLevel: info
  # Emit structured JSON logs (zap production encoder). Maps PROD_LOG_FORMAT.
  jsonLog: true
  # Enable GCP OS Login on gateway VMs (SSH access governed by IAM). Maps GATEWAY_ENABLE_OSLOGIN.
  enableOsLogin: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

link:
  # The gateway-link image the operator stamps onto each per-Gateway link
  # Deployment via GATEWAY_LINK_IMAGE. Built from the Dockerfile "link" target.
  image:
    repository: ""
    tag: ""
  # imagePullPolicy for the link container. Maps GATEWAY_LINK_IMAGE_PULL_POLICY.
  pullPolicy: IfNotPresent
